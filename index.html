<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090a0c" />
    <link rel="icon" href="data:," />
    <title>Was It There?</title>
  </head>
  <body>
    <div id="app">
      <canvas
        id="game-canvas"
        tabindex="0"
        aria-label="Was It There? 3D game view"
      ></canvas>

      <div id="menu-layer">
        <div class="menu-atmosphere" aria-hidden="true">
          <span class="menu-atmosphere__halo"></span>
          <span class="menu-atmosphere__door"></span>
          <span class="menu-atmosphere__sweep"></span>
          <span class="menu-atmosphere__grain"></span>
        </div>

        <span class="menu-corner menu-corner--top-left" aria-hidden="true"></span>
        <span class="menu-corner menu-corner--top-right" aria-hidden="true"></span>
        <span class="menu-corner menu-corner--bottom-left" aria-hidden="true"></span>
        <span class="menu-corner menu-corner--bottom-right" aria-hidden="true"></span>

        <main class="start-screen" aria-labelledby="game-title">
          <p class="start-screen__protocol">
            <span aria-hidden="true"></span>
            OBSERVATION PROTOCOL / 01
          </p>

          <div class="start-screen__title-block">
            <p class="start-screen__location">ROOM 01 — BEDROOM</p>
            <h1 id="game-title" data-text="WAS IT THERE?">
              WAS IT THERE?
            </h1>
            <p class="start-screen__premise">
              Memorize what is real.<br />Report what is not.
            </p>
          </div>

          <div
            id="mode-selection"
            class="start-screen__modes"
            role="group"
            aria-label="Game mode"
          >
            <button
              id="story-mode-button"
              class="mode-option is-selected"
              type="button"
              aria-pressed="true"
              disabled
            >
              <strong>STORY</strong>
              <span>Break the loop. Remember who lived here.</span>
            </button>
            <button
              id="escape-mode-button"
              class="mode-option"
              type="button"
              aria-pressed="false"
              disabled
            >
              <strong>ESCAPE</strong>
              <span id="escape-mode-description">
                Complete Story to unlock Escape.
              </span>
            </button>
          </div>

          <button id="play-button" type="button" disabled>
            PREPARING THE ROOM
          </button>

          <button
            id="story-notebook-button"
            class="start-screen__secondary-action"
            type="button"
            disabled
          >
            OPEN NOTEBOOK
          </button>

          <div class="start-screen__controls" aria-label="Game controls">
            <span><kbd>WASD</kbd> MOVE</span>
            <span><kbd>MOUSE</kbd> LOOK</span>
            <span><kbd>CLICK</kbd> REPORT</span>
          </div>
        </main>

        <p class="menu-build-mark" aria-hidden="true">
          MEMORY IS AN UNRELIABLE WITNESS
        </p>
      </div>

      <div id="hud-layer" aria-live="off"></div>
      <div id="modal-layer" aria-live="polite">
        <button id="pointer-lock-prompt" type="button" hidden>
          CLICK TO RESUME
        </button>
      </div>
    </div>

    <noscript>This game requires JavaScript.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
