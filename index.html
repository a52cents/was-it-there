<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#090a0c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./pwa-icon.svg" />
    <title>Was It There?</title>
  </head>
  <body>
    <div id="app">
      <canvas
        id="game-canvas"
        tabindex="0"
        aria-label="Was It There? 3D game view"
      ></canvas>

      <div id="menu-layer">
        <div class="menu-backdrop" aria-hidden="true"></div>

        <main class="start-screen" aria-labelledby="game-title">
          <p class="start-screen__time">03:04</p>

          <div class="start-screen__title-block">
            <h1 id="game-title">
              <span>WAS IT</span>
              <span>THERE?</span>
            </h1>
            <p class="start-screen__premise">
              Study the room.<br />
              When the lights return, report what changed.
            </p>
          </div>

          <div
            id="mode-selection"
            class="start-screen__modes"
            role="group"
            aria-label="Game mode"
          >
            <button
              id="story-mode-button"
              class="mode-option is-selected"
              type="button"
              aria-pressed="true"
              disabled
            >
              <span class="mode-option__number" aria-hidden="true">01</span>
              <span class="mode-option__body">
                <strong>STORY</strong>
                <span>Break the loop. Remember who lived here.</span>
              </span>
            </button>

            <button
              id="escape-mode-button"
              class="mode-option"
              type="button"
              aria-pressed="false"
              disabled
            >
              <span class="mode-option__number" aria-hidden="true">02</span>
              <span class="mode-option__body">
                <strong>ESCAPE</strong>
                <span id="escape-mode-description">
                  Complete Story to unlock Escape.
                </span>
              </span>
            </button>
          </div>

          <div class="start-screen__actions">
            <button id="play-button" type="button" disabled>LOADING</button>

            <button
              id="story-notebook-button"
              class="start-screen__secondary-action"
              type="button"
              disabled
            >
              OPEN NOTEBOOK
            </button>
          </div>

          <div
            id="start-loader"
            class="start-screen__loader"
            role="status"
            aria-live="polite"
          >
            <div class="start-screen__loader-copy">
              <span id="start-loader-label">INITIALIZING</span>
              <span id="start-loader-value">0%</span>
            </div>
            <div
              id="start-loader-track"
              class="start-screen__loader-track"
              role="progressbar"
              aria-label="Loading all rooms"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
            >
              <span
                id="start-loader-bar"
                class="start-screen__loader-bar"
              ></span>
            </div>
          </div>

          <div class="start-screen__controls" aria-label="Game controls">
            <span class="desktop-only">WASD / MOVE</span>
            <span class="desktop-only">MOUSE / LOOK</span>
            <span class="desktop-only">CLICK / REPORT</span>
            <span class="touch-only">JOYSTICK / MOVE</span>
            <span class="touch-only">DRAG / LOOK</span>
            <span class="touch-only">ACTION / REPORT</span>
          </div>
        </main>
      </div>

      <div id="hud-layer" aria-live="off"></div>
      <div id="modal-layer" aria-live="polite">
        <button id="pointer-lock-prompt" type="button" hidden>
          CLICK TO RESUME
        </button>
      </div>
    </div>

    <noscript>This game requires JavaScript.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
